  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a0d30;
      color: #f0e6ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #2a1550;
      border: 1px solid #c9a22740;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      color: #c9a227;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #cbb8e8;
      margin-bottom: 1.25rem;
    }

    p.sub {
      font-size: 0.9rem;
      color: #9980c0;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #c9a227, #e8c547);
      color: #1a0d30;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #c9a227, #e8c547);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #1a0d30;
      overflow: hidden;
      flex-shrink: 0;
    }



    .logo-text .brand {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: #c9a227;
      font-weight: 700;
    }

    .logo-text .tagline {
      font-size: 0.7rem;
      color: #9980c0;
      letter-spacing: 0.05em;
    }
  </style>
