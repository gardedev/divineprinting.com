<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a1f8a"/>
      <stop offset="100%" stop-color="#2a0f5e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Outer ring (subtle) -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#c9a227" stroke-width="0.6" opacity="0.35"/>

  <!-- Radiant rays (8 rays) -->
  <g fill="url(#gold)" opacity="0.25" transform="translate(32,32)">
    <rect x="-1" y="-27" width="2" height="8" rx="1"/>
    <rect x="-1" y="19" width="2" height="8" rx="1"/>
    <rect x="-27" y="-1" width="8" height="2" rx="1"/>
    <rect x="19" y="-1" width="8" height="2" rx="1"/>
    <rect x="-1" y="-27" width="2" height="8" rx="1" transform="rotate(45)"/>
    <rect x="-1" y="19" width="2" height="8" rx="1" transform="rotate(45)"/>
    <rect x="-27" y="-1" width="8" height="2" rx="1" transform="rotate(45)"/>
    <rect x="19" y="-1" width="8" height="2" rx="1" transform="rotate(45)"/>
  </g>

  <!-- Cross shadow/depth -->
  <g filter="url(#glow)">
    <!-- Vertical bar -->
    <rect x="28.5" y="11" width="7" height="42" rx="3.5" fill="url(#gold)"/>
    <!-- Horizontal bar -->
    <rect x="14" y="22" width="36" height="7" rx="3.5" fill="url(#gold)"/>
  </g>

  <!-- Dove silhouette (tiny, above cross) -->
  <g transform="translate(32,13)" fill="#1a0d30" opacity="0.55">
    <ellipse cx="0" cy="-2" rx="4" ry="2.5" transform="rotate(-20)"/>
    <polygon points="3,-1 8,1 3,2" />
    <ellipse cx="-1" cy="-1" rx="1.8" ry="1.5"/>
  </g>
</svg>
