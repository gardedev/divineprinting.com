<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a1f8a"/>
      <stop offset="100%" stop-color="#1a0d30"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d95a"/>
      <stop offset="100%" stop-color="#b8890f"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d95a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f5d95a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bgA)"/>

  <!-- Radial glow behind cross -->
  <circle cx="32" cy="32" r="22" fill="url(#glowA)"/>

  <!-- Outer ornate ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#goldA)" stroke-width="0.8" opacity="0.5"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#goldA)" stroke-width="0.4" opacity="0.3"/>

  <!-- 8 ray dashes on the ring -->
  <g stroke="url(#goldA)" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
    <line x1="32" y1="6"  x2="32" y2="10"/>
    <line x1="32" y1="54" x2="32" y2="58"/>
    <line x1="6"  y1="32" x2="10" y2="32"/>
    <line x1="54" y1="32" x2="58" y2="32"/>
    <line x1="13.5" y1="13.5" x2="16.4" y2="16.4"/>
    <line x1="47.6" y1="47.6" x2="50.5" y2="50.5"/>
    <line x1="50.5" y1="13.5" x2="47.6" y2="16.4"/>
    <line x1="16.4" y1="47.6" x2="13.5" y2="50.5"/>
  </g>

  <!-- Cross — thick, beveled look via layering -->
  <!-- shadow layer -->
  <rect x="29.5" y="12" width="7" height="40" rx="2" fill="#7a5c00" opacity="0.6"/>
  <rect x="13" y="23.5" width="38" height="7" rx="2" fill="#7a5c00" opacity="0.6"/>
  <!-- main gold -->
  <rect x="29" y="11.5" width="6" height="40" rx="2" fill="url(#goldA)"/>
  <rect x="12.5" y="23" width="39" height="6" rx="2" fill="url(#goldA)"/>
  <!-- highlight stripe -->
  <rect x="30.5" y="11.5" width="1.5" height="40" rx="0.75" fill="white" opacity="0.2"/>
  <rect x="12.5" y="24.5" width="39" height="1.5" rx="0.75" fill="white" opacity="0.2"/>
</svg>
